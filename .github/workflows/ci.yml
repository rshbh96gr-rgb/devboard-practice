
name: CI

on:
  push:
    branches: [ master ]


jobs:

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup NodeJs  
        uses: actions/setup-node@v6
        with: 
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm Packages
        run: npm ci

      - name: Run linter
        run: npm run lint
      
      - name: Run Tests
        run: npm run test 
